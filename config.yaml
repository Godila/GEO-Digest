# Geo-Ecology Digest Agent Configuration
# Journal: Geology and Geophysics of Russian South (ISSN 2221-3198)
# Goal: find world papers implementable for Russian South context

digest:
  articles_per_run: 25   # First run: fill KB with 25-30; then revert to 4 for daily updates
  language: en          # only English (no Russian papers)
  min_year: 2023        # priority: last 2-3 years
  max_results_per_topic: 25  # raw results before scoring

scoring:
  methodological_transferability: 0.25
  geographic_analogy: 0.20
  thematic_relevance: 0.20
  publication_potential: 0.20
  practical_output: 0.10
  novelty_of_approach: 0.05

analogous_regions:
  # Regions similar to South Russia for geographic analogy scoring
  - Caucasus region (Georgia, Armenia, Azerbaijan)
  - Alpine region (Italy, Switzerland, Austria, France)
  - Iranian Plateau
  - Central Asia (Kazakhstan, Kyrgyzstan, Uzbekistan)
  - Andean region (Chile, Argentina, Peru)
  - Mediterranean (Turkey, Greece, Balkans)
  - Carpathians (Romania, Ukraine, Poland)

article_types:
  # Three types of valuable findings
  reproduction:
    label: "воспроизведение"
    desc: "Method/experiment reproducible on South Russia material"
  review:
    label: "обзор"
    desc: "Base for review article with Russian context"
  method_transfer:
    label: "метод"
    desc: "New methodology not yet applied in Russia for this task"

topics:
  seismology:
    name_ru: "Сейсмология"
    queries:
      - "seismic monitoring mountain regions machine learning"
      - "earthquake source parameters inversion"
      - "aftershock sequence analysis ETAS model"
      - "seismic hazard assessment active faults"
      - "induced seismicity mining injection"
      - "radon earthquake precursor monitoring"
      - "electromagnetic emission earthquake precursor"
      - "seismic wave propagation complex media"
      - "microseismic monitoring mining areas"

  geophysics_methods:
    name_ru: "Геофизические методы"
    queries:
      - "mud volcano geophysical monitoring Caspian"
      - "seismic velocity model tectonic structure basin"
      - "geophysical exploration gold mineralization"
      - "thermal hydrodynamic reservoir characterization"
      - "permeability impairment zone well testing"

  landslide_hazards:
    name_ru: "Опасные геологические процессы"
    queries:
      - "landslide monitoring rainfall trigger early warning"
      - "hillslope stability hydrology InSAR"
      - "slope failure prediction machine learning"
      - "debris flow monitoring mountain regions"
      - "rockfall risk assessment methods"

  geoecology_mining:
    name_ru: "Геоэкология и горнодобыча"
    queries:
      - "heavy metals soil contamination mining remediation"
      - "lead zinc mine soil pollution mobility"
      - "gold mining environmental impact assessment"
      - "mine tailings geochemical risk"
      - "agricultural soil heavy metal bioavailability"
      - "phytoremediation heavy metal contaminated soils"

  climate_remote_sensing:
    name_ru: "Климат и дистанционное зондирование"
    queries:
      - "climate trends mountain regions temperature precipitation"
      - "aridification mountain ecosystems remote sensing"
      - "satellite atmospheric monitoring NO2 aerosol PM2.5"
      - "river basin land cover change dynamics Sentinel"
      - "drought monitoring satellite data mountainous"

  oil_gas:
    name_ru: "Нефть и газ"
    queries:
      - "fluid dynamics sedimentary basin hydrocarbon accumulation"
      - "thermohydrodynamic well test interpretation"
      - "reservoir permeability damage near-wellbore"
      - "basin modeling petroleum system evaluation"

  mineralogy_petrology:
    name_ru: "Минералогия и петрология"
    queries:
      - "accessory mineral geochronometry titanite zircon apatite"
      - "magmatic belt U-Pb dating granite"
      - "mineral chemistry provenance reconstruction"

sources:
  crossref:
    enabled: true
    base_url: "https://api.crossref.org/works"
    priority: 0          # PRIMARY: fastest, broadest, 140M DOI, no key
  openalex:
    enabled: true
    base_url: "https://api.openalex.org"
    priority: 1           # concepts/topics, free, no key
  europe_pmc:
    enabled: true
    base_url: "https://www.ebi.ac.uk/europepmc/webservices/rest/search"
    priority: 2           # full-text OA, earth sciences
  semantic_scholar:
    enabled: true
    base_url: "https://api.semanticscholar.org/graph/v1"
    priority: 3
  arxiv:
    enabled: true
    base_url: "https://export.arxiv.org/api/query"
    priority: 4
    categories:
      - "physics.geo-ph"   # geophysics
      - "cond-mat.stat-mech"  # statistical mechanics (relevant for some geo methods)
  unpaywall:
    enabled: true
    base_url: "https://api.unpaywall.org/v2"
    role: "enrichment"     # not a search source — enriches found DOIs with OA info

paths:
  base: "~/.hermes/geo_digest"
  articles_dir: "articles"
  seen_dois: "seen_dois.txt"
  articles_db: "articles.jsonl"
  graphify_output: "graphify-out"
  octopoda_agent_name: "geo_digest"
