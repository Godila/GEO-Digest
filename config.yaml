# Geo-Ecology Digest — Configuration
# ====================================

# ── LLM Settings ──────────────────────────────────────
llm:
  model: "MiniMax-M2.7"
  base_url: "https://api.minimax.chat/v1"
  api_key_env: "MINIMAX_API_KEY"
  disable_thinking: true
  max_tokens: 4096

# ── Source Configuration ──────────────────────────────
sources:
  openalex:
    enabled: true
    per_page: 10

  semantic_scholar:
    enabled: true
    limit: 5
    # If SEMANTIC_SCHOLAR_API_KEY is set in .env → stable 1 req/s
    # If not set → shared pool (flaky, may get 429)

  core_ac:
    enabled: true
    per_page: 10

  doaj:
    enabled: true
    per_page: 5

  arxiv:
    enabled: true
    max_results: 5
    mode: "all"  # "all" = search all queries, "specific" = only arxiv_specific_queries

  crossref:
    role: "enrich"  # Not used for search, only DOI/ISSN lookup
    enabled: true

  unpaywall:
    role: "enrich"  # OA status + PDF URL lookup
    enabled: true

# ── arXiv-specific queries (used when arxiv.mode == "specific") ──
# These are ML/methods-focused queries that match arXiv's domain well.
arxiv_specific_queries:
  - "machine learning seismic phase picking"
  - "deep learning InSAR deformation monitoring"
  - "neural network earthquake detection"
  - "physics-informed neural network geophysics"
  - "transformer seismic signal processing"
  - "graph neural network geophysical inversion"
  - "unsupervised learning landslide detection"
  - "remote sensing deep learning soil contamination"

# ── Scoring Weights (keys MUST match score_article() in digest.py) ──
scoring_weights:
  methodological_transferability: 0.25
  geographic_analogy: 0.25
  thematic_relevance: 0.20
  publication_potential: 0.15
  practical_output: 0.10
  novelty_of_approach: 0.05

# ── Source Reliability Weights (multiplier for total score) ──
source_weights:
  doaj:              1.08   # peer-reviewed OA journals
  semantic_scholar:  1.10   # best abstracts + citation data
  openalex:          1.05   # good metadata + topics
  core_ac:           1.05   # verified OA content
  crossref:          1.00   # baseline (enrich only)
  arxiv:             0.95   # preprint, not peer-reviewed

# ── Digest Settings ───────────────────────────────────
articles_per_run: 25
min_year: 2023
relevance_threshold: 2.5

# ── Topics & Queries ──────────────────────────────────
topics:
  seismology_and_monitoring:
    name_ru: "Сейсмика и мониторинг"
