services:
  # ── Dashboard (pure UI + API gateway) ──────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: geo-digest-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - geo-data:/app/data:rw
      - ./dashboard/templates:/app/dashboard/templates:ro
      - ./dashboard/static:/app/dashboard/static:ro
    environment:
      - DASHBOARD_PORT=3000
      - WORKER_URL=http://worker:3001
      - DATA_DIR=/app/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    depends_on:
      - worker
    networks:
      - geo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Worker (compute backend) ───────────────────
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: geo-digest-worker
    restart: unless-stopped
    volumes:
      - geo-data:/app/data:rw
      - .:/app/src:ro
      - /root/.hermes/geo_digest/.env:/app/.env:ro
    environment:
      - WORKER_PORT=3001
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 128M
    networks:
      - geo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  geo-data:
    external: false

networks:
  geo-net:
    driver: bridge
