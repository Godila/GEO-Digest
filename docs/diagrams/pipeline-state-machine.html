<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline State Machine — GEO-Digest</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; font-family: 'Geist', sans-serif; padding: 2rem; }
  .page { max-width: 960px; margin: 0 auto; }
  .eyebrow { font-family: 'Geist Mono', monospace; font-size: 8px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #4f5d75; margin-bottom: 4px; }
  h1 { font-family: 'Instrument Serif', serif; font-size: 1.75rem; font-weight: 400; color: #2d3142; margin-bottom: 0.25rem; }
  .subtitle { font-family: 'Geist', sans-serif; font-size: 13px; color: #4f5d75; margin-bottom: 1.5rem; }
  svg { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<div class="page">
  <p class="eyebrow">State Machine · GEO-Digest</p>
  <h1>PipelineJob Lifecycle</h1>
  <p class="subtitle">Seven states, ten transitions — from topic to published article</p>

<svg viewBox="0 0 920 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/>
    </marker>
    <marker id="arrow-muted" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7a8399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f5f5f5"/>

  <!-- ═══ ARROWS (behind nodes) ═══ -->

  <!-- Start dot → idle -->
  <line x1="32" y1="140" x2="56" y2="140" stroke="#2d3142" stroke-width="1"/>

  <!-- idle → scouting -->
  <line x1="180" y1="140" x2="220" y2="140" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="178" y="126" width="36" height="11" rx="2" fill="#f5f5f5"/>
  <text x="196" y="135" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">/RUN</text>

  <!-- scouting → editing -->
  <line x1="380" y1="140" x2="420" y2="140" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="378" y="126" width="36" height="11" rx="2" fill="#f5f5f5"/>
  <text x="396" y="135" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">FOUND</text>

  <!-- editing → selecting -->
  <line x1="580" y1="140" x2="620" y2="140" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="576" y="126" width="44" height="11" rx="2" fill="#f5f5f5"/>
  <text x="598" y="135" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">READY</text>

  <!-- selecting → developing (DOWN then LEFT — user picks proposal) -->
  <path d="M 700 172 L 700 280 Q 700 300 680 300 L 180 300" stroke="#4f5d75" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <rect x="704" y="224" width="48" height="11" rx="2" fill="#f5f5f5"/>
  <text x="728" y="233" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">/SELECT</text>

  <!-- developing → reviewing -->
  <line x1="180" y1="300" x2="380" y2="300" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="252" y="286" width="44" height="11" rx="2" fill="#f5f5f5"/>
  <text x="274" y="295" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">DRAFT</text>

  <!-- reviewing → done -->
  <line x1="540" y1="300" x2="620" y2="300" stroke="#eb6c36" stroke-width="1" marker-end="url(#arrow-accent)"/>
  <rect x="550" y="286" width="44" height="11" rx="2" fill="#f5f5f5"/>
  <text x="572" y="295" fill="#eb6c36" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em" font-weight="600">ACCEPT</text>

  <!-- done → end dot -->
  <line x1="780" y1="300" x2="840" y2="300" stroke="#2d3142" stroke-width="1"/>

  <!-- ═══ FEEDBACK LOOP: reviewing → developing (curves UP above) ═══ -->
  <path d="M 440 268 C 440 220 160 220 108 268" stroke="#eb6c36" stroke-width="1" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-accent)"/>
  <rect x="262" y="218" width="76" height="11" rx="2" fill="#f5f5f5"/>
  <text x="300" y="227" fill="#eb6c36" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em" font-weight="600">REVISION ×3</text>

  <!-- ═══ ERROR PATHS (dashed, down to failed) ═══ -->

  <!-- scouting → failed -->
  <path d="M 300 172 L 300 390 L 540 390" stroke="#7a8399" stroke-width="0.8" stroke-dasharray="4,4" fill="none" marker-end="url(#arrow-muted)"/>
  <rect x="260" y="380" width="56" height="11" rx="2" fill="#f5f5f5"/>
  <text x="288" y="389" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle">0 RESULTS</text>

  <!-- editing → failed -->
  <path d="M 500 172 L 500 390 L 540 390" stroke="#7a8399" stroke-width="0.8" stroke-dasharray="4,4" fill="none" marker-end="url(#arrow-muted)"/>
  <rect x="464" y="380" width="40" height="11" rx="2" fill="#f5f5f5"/>
  <text x="484" y="389" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle">ERROR</text>

  <!-- failed → end dot -->
  <line x1="700" y1="390" x2="840" y2="390" stroke="#2d3142" stroke-width="1"/>

  <!-- ═══ DEVELOPING SELF-LOOP (Pass 2b expand) ═══ -->
  <path d="M 76 268 C 76 240 144 240 144 268" stroke="#7a8399" stroke-width="0.8" stroke-dasharray="4,4" fill="none" marker-end="url(#arrow-muted)"/>
  <rect x="82" y="236" width="48" height="11" rx="2" fill="#f5f5f5"/>
  <text x="106" y="245" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle">EXPAND</text>

  <!-- ═══ NODES ═══ -->

  <!-- Start dot -->
  <circle cx="24" cy="140" r="5" fill="#2d3142"/>

  <!-- idle -->
  <rect x="56" y="108" width="124" height="64" rx="8" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="118" y="138" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">idle</text>
  <text x="118" y="156" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">initial state</text>

  <!-- scouting -->
  <rect x="220" y="108" width="160" height="64" rx="8" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="300" y="138" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">scouting</text>
  <text x="300" y="156" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">Semantic Scholar API</text>

  <!-- editing -->
  <rect x="420" y="108" width="160" height="64" rx="8" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="500" y="138" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">editing</text>
  <text x="500" y="156" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">DS V4 Flash · proposals</text>

  <!-- selecting (user input) -->
  <rect x="620" y="108" width="160" height="64" rx="8" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
  <text x="700" y="138" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">selecting</text>
  <text x="700" y="156" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">user picks proposal</text>

  <!-- developing -->
  <rect x="56" y="268" width="124" height="64" rx="8" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="118" y="298" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">developing</text>
  <text x="118" y="316" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">Reader + Writer</text>

  <!-- reviewing -->
  <rect x="380" y="268" width="160" height="64" rx="8" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="460" y="298" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">reviewing</text>
  <text x="460" y="316" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">Gemini 3.1 Pro</text>

  <!-- done (final — accent) -->
  <rect x="620" y="268" width="160" height="64" rx="8" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1.5"/>
  <text x="700" y="298" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">done</text>
  <text x="700" y="316" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">10K+ words · article</text>

  <!-- End dot (done) -->
  <circle cx="852" cy="300" r="7" fill="none" stroke="#2d3142" stroke-width="1"/>
  <circle cx="852" cy="300" r="4" fill="#2d3142"/>

  <!-- failed -->
  <rect x="540" y="362" width="160" height="56" rx="8" fill="rgba(45,49,66,0.04)" stroke="#7a8399" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="620" y="390" fill="#4f5d75" font-size="11" font-weight="500" font-family="'Geist', sans-serif" text-anchor="middle">failed</text>
  <text x="620" y="406" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">error logged</text>

  <!-- End dot (failed) -->
  <circle cx="852" cy="390" r="7" fill="none" stroke="#4f5d75" stroke-width="1"/>
  <circle cx="852" cy="390" r="4" fill="#4f5d75"/>

  <!-- ═══ LEGEND ═══ -->
  <line x1="40" y1="440" x2="880" y2="440" stroke="rgba(45,49,66,0.08)" stroke-width="0.8"/>
  <text x="40" y="460" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" letter-spacing="0.14em" font-weight="600">LEGEND</text>

  <rect x="100" y="452" width="20" height="10" rx="3" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="128" y="461" fill="#7a8399" font-size="8" font-family="'Geist', sans-serif">Final state</text>

  <line x1="200" y1="457" x2="228" y2="457" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="236" y="461" fill="#7a8399" font-size="8" font-family="'Geist', sans-serif">Forward</text>

  <line x1="296" y1="457" x2="324" y2="457" stroke="#eb6c36" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow-accent)"/>
  <text x="332" y="461" fill="#7a8399" font-size="8" font-family="'Geist', sans-serif">Revision (×3 max)</text>

  <line x1="456" y1="457" x2="484" y2="457" stroke="#7a8399" stroke-width="0.8" stroke-dasharray="4,4" marker-end="url(#arrow-muted)"/>
  <text x="492" y="461" fill="#7a8399" font-size="8" font-family="'Geist', sans-serif">Error path</text>

  <rect x="572" y="452" width="20" height="10" rx="3" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
  <text x="600" y="461" fill="#7a8399" font-size="8" font-family="'Geist', sans-serif">User action</text>

  <rect x="680" y="452" width="20" height="10" rx="3" fill="rgba(45,49,66,0.04)" stroke="#7a8399" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="708" y="461" fill="#7a8399" font-size="8" font-family="'Geist', sans-serif">Error state</text>
</svg>
</div>
</body>
</html>
